name: Reusable Build Docs

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: "The commit SHA or ref to checkout. Defaults to the workflow trigger ref."
      single_version:
        required: false
        type: boolean
        default: false
        description: "If true, generates only the documentation for the current version, without historical tags."

jobs:
  build_docs:
    name: Build Docs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install doxygen graphviz
      - name: Build Docs
        run: |
          if [ "${{ inputs.single_version }}" == "true" ]; then
            VERSION=$(cat VERSION)
            sed -i "s/^PROJECT_NUMBER\s*=.*/PROJECT_NUMBER = \"$VERSION\"/" docs/Doxyfile
            doxygen docs/Doxyfile
          else
            python3 scripts/generate_versioned_docs.py --verbose
          fi
      - name: Upload Docs
        uses: actions/upload-artifact@v7
        with:
          name: vclib_docs
          path: docs/_doxygen/html
