name: Render - Build and run Tests

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: "The commit SHA or ref to checkout. Defaults to the workflow trigger ref."

jobs:
  render_build_and_run_tests:
    name: Render - Build and run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-2022']
        render_backend: ['bgfx', 'opengl2']
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ inputs.ref || github.ref }}
    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      if: runner.os == 'Windows'
      with:
        arch: x64
    - name: Install Qt
      uses: ./.github/actions/install-qt
    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install cmake ninja-build libtbb-dev catch2 libgmp-dev libmpfr-dev
        sudo apt-get install freeglut3-dev libgl1-mesa-dev libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev libglfw3-dev
    - name: Install dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install catch2 glfw gmp mpfr
    - name: Install dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ninja ccache
    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: render-${{ matrix.os }}-${{matrix.render_backend}}
        max-size: 1G
    - name: Build
      shell: bash
      run: |
        mkdir build
        cmake -B build --preset=vclib-render-${{matrix.render_backend}}-ci \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build --parallel
