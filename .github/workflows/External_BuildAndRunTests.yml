name: External - Build and run Tests

on:
  [push, pull_request]

jobs:
  external_build_and_run_tests:
    name: External - Build and run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-latest']
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      if: runner.os == 'Windows'
      with:
        arch: x64
    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install cmake ninja-build libtbb-dev catch2
        sudo apt-get install libcgal-dev libembree-dev
    - name: Install dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install catch2
        brew install embree cgal
    - name: Install dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ninja ccache
        choco install embree boost-msvc-14.3
    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: external-${{ matrix.os }}-${{ github.ref_name }}
    - name: Build
      shell: bash
      run: |
        mkdir build
        if [ "$RUNNER_OS" == "Windows" ]; then
          export CMAKE_PREFIX_PATH="C:/ProgramData/chocolatey/lib/embree.install/tools"
        fi
        cmake -B build --preset=vclib-external-ci \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build --parallel
    - name: Run Tests
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          CURRENT_PATH=$(pwd)
          export PATH="/c/ProgramData/chocolatey/lib/embree.install/tools/embree-4.4.1.x64.windows/bin:$PATH"
          export PATH="$CURRENT_PATH/build/_deps/cgal-src/auxiliary/gmp/bin:$PATH"
        fi
        cd build
        ctest --verbose
