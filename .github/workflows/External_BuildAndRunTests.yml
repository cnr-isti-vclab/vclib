name: External - Build and run Tests

on:
  [push, pull_request]

jobs:
  external_build_and_run_tests:
    name: External - Build and run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-latest']
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Export GitHub Actions cache environment variables
      if: runner.os == 'Windows'
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
    - name: Setup vcpkg and activate Binary Cache
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '56bb2411609227288b70117ead2c47585ba07713'
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
      env:
        VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install cmake ninja-build libtbb-dev catch2
        sudo apt-get install libcgal-dev libembree-dev
    - name: Install dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install catch2
        brew install embree
        brew install cgal
    - name: Install dependencies
      if: runner.os == 'Windows'
      run: |
        winget install Ccache.Ccache Ninja-build.Ninja --accept-source-agreements --accept-package-agreements
        # embree not available with winget
        choco install embree
        ${{ github.workspace }}\vcpkg\vcpkg install cgal
    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        key: external-${{ matrix.os }}-${{ github.ref_name }}
    - name: Build
      shell: bash
      run: |
        mkdir build
        if [ "$RUNNER_OS" == "Windows" ]; then
          export CMAKE_PREFIX_PATH="C:/ProgramData/chocolatey/lib/embree.install/tools"
          export CMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        fi
        cmake -B build --preset=vclib-external-ci \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build --parallel
    - name: Run Tests
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          export PATH="/c/ProgramData/chocolatey/lib/embree.install/tools/embree-4.4.1.x64.windows/bin:$PATH"
        fi
        cd build
        ctest --verbose
