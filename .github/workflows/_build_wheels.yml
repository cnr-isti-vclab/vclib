name: Reusable Bindings - Build and test Wheel

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: "The commit SHA or ref to checkout. Defaults to the workflow trigger ref."

jobs:
  bindings_build_wheel:
    name: Bindings - Build Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-2022']
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ inputs.ref || github.ref }}

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      if: runner.os == 'Windows'
      with:
        arch: x64

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        cache: 'true'
        version: '6.10.*'

    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install cmake ninja-build
        sudo apt-get install freeglut3-dev libgl1-mesa-dev libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev libgmp-dev libmpfr-dev

    - name: Install dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ninja ccache

    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: bindings-${{ matrix.os }}-${{ github.ref_name }}

    - name: Build Wheel 3.12
      uses: ./.github/actions/build-python-wheel
      with:
        python-version: '3.12'
        os: ${{ runner.os }}

    - name: Build Wheel 3.13
      uses: ./.github/actions/build-python-wheel
      with:
        python-version: '3.13'
        os: ${{ runner.os }}

    - name: Build Wheel 3.14
      uses: ./.github/actions/build-python-wheel
      with:
        python-version: '3.14'
        os: ${{ runner.os }}

    - name: Upload Wheels
      uses: actions/upload-artifact@v7
      with:
        name: vclib-wheel-${{ matrix.os }}
        path: dist/*.whl

  run_python_examples:
    name: Run Python Examples (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: bindings_build_wheel
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-2022']
        python-version: ['3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ inputs.ref || github.ref }}

    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install freeglut3-dev

    - name: Install Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - uses: actions/download-artifact@v8
      with:
        name: vclib-wheel-${{ matrix.os }}
        path: dist/

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip setuptools wheel
        py_ver="${{ matrix.python-version }}"
        py_tag="cp${py_ver//./}"
        python -m pip install dist/*${py_tag}*.whl

    - name: Run examples
      shell: bash
      run: |
        for f in examples/bindings/*.py; do
          printf "=== Running $f ===\n"
          python "$f"
          printf "\n"
        done
