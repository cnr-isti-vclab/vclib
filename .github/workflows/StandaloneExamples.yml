name: Standalone Examples - Build and Run

on:
  workflow_dispatch

jobs:
  build_and_run_standalone_examples:
    name: Standalone Examples (${{ matrix.os }}, ${{ matrix.module }}, ${{ matrix.integration_mode }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-2022']
        integration_mode: ['find_package', 'FetchContent']
        module: ['core', 'external', 'render']
        exclude:
          - module: 'external'
            integration_mode: 'find_package'
          - module: 'render'
            integration_mode: 'find_package'
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      if: runner.os == 'Windows'
      with:
        arch: x64

    - name: Install Qt
      if: matrix.module == 'render'
      uses: jurplel/install-qt-action@v4
      with:
        cache: 'true'
        version: '6.10.*'

    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libtbb-dev
        if [ "${{ matrix.module }}" == "external" ]; then
          sudo apt-get install -y libcgal-dev libembree-dev
        fi
        if [ "${{ matrix.module }}" == "render" ]; then
          sudo apt-get install -y freeglut3-dev libgl1-mesa-dev libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev libglfw3-dev
        fi

    - name: Install dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install cmake ninja tbb
        if [ "${{ matrix.module }}" == "external" ]; then
          brew install embree cgal
        fi
        if [ "${{ matrix.module }}" == "render" ]; then
          brew install glfw
        fi

    - name: Install dependencies
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install -y cmake ninja
        if [ "${{ matrix.module }}" == "external" ]; then
          choco install -y embree boost-msvc-14.3
        fi

    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: standalone-${{ matrix.os }}-${{ matrix.integration_mode }}-${{ matrix.module }}-${{ github.ref_name }}

    - name: Build and Install VCLib
      if: matrix.integration_mode == 'find_package'
      shell: bash
      run: |
        # In find_package mode, we must first build and install VCLib
        cmake -S . -B build-vclib --preset=vclib-core-install
        cmake --build build-vclib
        cmake --install build-vclib --prefix "${{ github.workspace }}/install-vclib"

    - name: Configure Standalone Examples
      shell: bash
      run: |
        EXTRA_ARGS=""
        if [ "${{ matrix.integration_mode }}" == "FetchContent" ]; then
          EXTRA_ARGS="-DVCLIB_USE_FETCHCONTENT=ON"
        else
          EXTRA_ARGS="-DVCLIB_USE_FETCHCONTENT=OFF -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install-vclib"
        fi
        
        if [ "${{ matrix.module }}" == "core" ]; then
          EXTRA_ARGS="$EXTRA_ARGS -DVCLIB_STANDALONE_BUILD_CORE=ON -DVCLIB_STANDALONE_BUILD_EXTERNAL=OFF -DVCLIB_STANDALONE_BUILD_RENDER=OFF"
        elif [ "${{ matrix.module }}" == "external" ]; then
          EXTRA_ARGS="$EXTRA_ARGS -DVCLIB_STANDALONE_BUILD_CORE=OFF -DVCLIB_STANDALONE_BUILD_EXTERNAL=ON -DVCLIB_STANDALONE_BUILD_RENDER=OFF"
        elif [ "${{ matrix.module }}" == "render" ]; then
          EXTRA_ARGS="$EXTRA_ARGS -DVCLIB_STANDALONE_BUILD_CORE=OFF -DVCLIB_STANDALONE_BUILD_EXTERNAL=OFF -DVCLIB_STANDALONE_BUILD_RENDER=ON -DVCLIB_RENDER_BACKEND=bgfx"
        fi
        
        if [ "$RUNNER_OS" == "Windows" ] && [ "${{ matrix.module }}" == "external" ]; then
          export CMAKE_PREFIX_PATH="C:/ProgramData/chocolatey/lib/embree.install/tools"
        fi
        
        cmake -S examples/standalone -B examples/standalone/build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          $EXTRA_ARGS

    - name: Build Standalone Examples
      run: cmake --build examples/standalone/build

    - name: Run Tests
      working-directory: examples/standalone/build
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ] && [ "${{ matrix.module }}" == "external" ]; then
          CURRENT_PATH=$(pwd)
          export PATH="/c/ProgramData/chocolatey/lib/embree.install/tools/embree-4.4.1.x64.windows/bin:$PATH"
          export PATH="$CURRENT_PATH/_deps/cgal-src/auxiliary/gmp/bin:$PATH"
        fi
        if [ "${{ matrix.module }}" != "render" ]; then
          ctest --output-on-failure
        else
          echo "Skipping tests for render module"
        fi

    - name: Build Template Project (Core)
      if: matrix.integration_mode == 'FetchContent' && matrix.module == 'core'
      shell: bash
      run: |
        cmake -S examples/standalone/core-template-project -B examples/standalone/core-template-project/build -G Ninja
        cmake --build examples/standalone/core-template-project/build

    - name: Build Template Project (External)
      if: matrix.integration_mode == 'FetchContent' && matrix.module == 'external'
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ] && [ "${{ matrix.module }}" == "external" ]; then
          export CMAKE_PREFIX_PATH="C:/ProgramData/chocolatey/lib/embree.install/tools"
        fi
        cmake -S examples/standalone/external-template-project -B examples/standalone/external-template-project/build -G Ninja
        cmake --build examples/standalone/external-template-project/build

    - name: Build Template Project (Render - Custom Shader)
      if: matrix.integration_mode == 'FetchContent' && matrix.module == 'render'
      shell: bash
      run: |
        cmake -S examples/standalone/render-template-project-custom-shader -B examples/standalone/render-template-project-custom-shader/build -G Ninja
        cmake --build examples/standalone/render-template-project-custom-shader/build

    - name: Build Template Project (Render - Mesh Viewer)
      if: matrix.integration_mode == 'FetchContent' && matrix.module == 'render'
      shell: bash
      run: |
        cmake -S examples/standalone/render-template-project-mesh-viewer -B examples/standalone/render-template-project-mesh-viewer/build -G Ninja
        cmake --build examples/standalone/render-template-project-mesh-viewer/build
